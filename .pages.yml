# Pages CMS 配置 —— 网页版编辑器(https://app.pagescms.org)读取本文件。
# Astro 构建时会忽略它,所以改它不影响网站本身。

media:
  input: public/uploads # 上传的图片存到仓库这个目录
  output: /uploads # 网站里用 /uploads/... 引用

content:
  - name: posts
    label: 博客文章 Posts
    type: collection
    path: src/content/blog
    # 新建文章时让你填文件名(就是网址),英文小写,例如 morning-ride
    filename:
      template: '{primary}.md'
      field: create
    view:
      fields: [title, lang, pubDate]
      primary: title
    fields:
      - name: title
        label: 标题 Title(中英文都行)
        type: string
      - name: description
        label: 摘要 Description
        type: text
      - name: pubDate
        label: 日期 Date
        type: date
      - name: lang
        label: 语言 Language
        type: select
        default: zh
        options:
          values: [zh, en]
      - name: draft
        label: 草稿 Draft(勾选则不公开)
        type: boolean
        default: false
      - name: body
        label: 正文 Body
        type: rich-text
